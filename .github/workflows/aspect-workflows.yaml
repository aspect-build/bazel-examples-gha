name: Aspect Workflows

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    # Cancel previous actions from the same PR or branch except 'main' branch.
    # See https://docs.github.com/en/actions/using-jobs/using-concurrency and https://docs.github.com/en/actions/learn-github-actions/contexts for more info.
    group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
    cancel-in-progress: ${{ github.ref_name != 'main' }}

# Migrated from `rosetta run <task>` to `aspect <task>`.
# See https://docs.aspect.build/cli/migration for details.
# Task configuration lives in .aspect/config.axl; CLI version pinned in .aspect/version.axl.

jobs:
    gazelle:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts
            - name: Gazelle
              run: aspect gazelle --check
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: gazelle.artifacts
                  path: /workflows/artifacts/**
                  overwrite: true

    buildifier:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts
            - name: Buildifier
              run: bazel run //:buildifier.check
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: buildifier.artifacts
                  path: /workflows/artifacts/**
                  overwrite: true

    lint:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        env:
            # GITHUB_PR_HEAD_SHA required for Checks and Suggested Fixes
            GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
              with:
                  # aspect lint needs origin/main reachable to compute changed files
                  fetch-depth: 0
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts
            - name: Lint
              run: aspect lint //...
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: lint.artifacts
                  path: /workflows/artifacts/**
                  overwrite: true

    format:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
              with:
                  # aspect format needs origin/main reachable to compute changed files
                  fetch-depth: 0
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts
            - name: Format
              run: aspect format
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: format.artifacts
                  path: /workflows/artifacts/**
                  overwrite: true

    test_0:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts /workflows/testlogs
            - name: Test
              run: aspect test --task-key=test_0 -- //... -//angular/... -//speller/...
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test_0.artifacts
                  path: |
                      /workflows/artifacts/**
                      /workflows/testlogs/**
                  overwrite: true

    test_1:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts /workflows/testlogs
            - name: Test
              run: aspect test --task-key=test_1 -- //angular/...
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test_1.artifacts
                  path: |
                      /workflows/artifacts/**
                      /workflows/testlogs/**
                  overwrite: true

    delivery:
        if: github.ref_name == 'main'
        needs: [test_0, test_1]
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - name: Clone repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Prepare archive directories
              run: rm -rf /workflows/artifacts
            - name: Delivery
              run: aspect delivery
            - name: Upload artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: delivery.artifacts
                  path: /workflows/artifacts/**
                  overwrite: true
